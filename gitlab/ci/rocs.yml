stages:
  - validate

rocs:validate:
  stage: validate
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  rules:
    - when: always
  allow_failure: true
  script:
    - python --version
    - uv --version
    - bash scripts/rocs.sh version
    - ROCS_CI_PROFILE=branch-ci bash scripts/ci/full.sh
  artifacts:
    when: always
    paths:
      - ontology/dist/
