name: publish

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish npm package from GitHub Release intent
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci --ignore-scripts --no-audit --no-fund && exit 0
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
      - name: Use npm CLI with Trusted Publishing support
        run: npm install -g npm@latest
      - name: Verify Trusted Publishing runtime prerequisites
        run: |
          NPM_VERSION="$(npm --version)"
          node - "$NPM_VERSION" <<'NODE'
          const npmVersion = process.argv[2] ?? '';
          const parse = (value) => value.split('.').map((part) => Number.parseInt(part, 10));
          const [nodeMajor, nodeMinor] = parse(process.versions.node);
          const [npmMajor, npmMinor, npmPatch] = parse(npmVersion);
          const hasMinimumNpm = npmMajor > 11 || (npmMajor === 11 && (npmMinor > 5 || (npmMinor === 5 && npmPatch >= 1)));
          if (nodeMajor < 22 || (nodeMajor === 22 && nodeMinor < 14)) {
            throw new Error(`npm Trusted Publishing requires Node >=22.14.0; got ${process.version}.`);
          }
          if (!hasMinimumNpm) {
            throw new Error(`npm Trusted Publishing requires npm >=11.5.1; got ${npmVersion}.`);
          }
          for (const name of ['GITHUB_ACTIONS', 'ACTIONS_ID_TOKEN_REQUEST_URL', 'ACTIONS_ID_TOKEN_REQUEST_TOKEN']) {
            if (!process.env[name]) {
              throw new Error(`Missing GitHub OIDC environment variable required for Trusted Publishing: ${name}`);
            }
          }
          console.log(JSON.stringify({
            npmTrustedPublishing: 'oidc-runtime-prerequisites-present',
            packageName: 'ts-quality',
            expectedTrustedPublisher: {
              owner: 'tryingET',
              repository: 'ts-quality',
              workflowFilename: 'publish.yml',
              environmentName: 'npm-publish'
            },
            node: process.version,
            npm: npmVersion,
            githubRepository: process.env.GITHUB_REPOSITORY,
            githubWorkflow: process.env.GITHUB_WORKFLOW,
            githubEventName: process.env.GITHUB_EVENT_NAME,
            githubRefType: process.env.GITHUB_REF_TYPE,
            githubRefName: process.env.GITHUB_REF_NAME
          }, null, 2));
          NODE
      - name: Validate GitHub Release intent
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_REF_TYPE: tag
        run: npm run release:intent:check --silent
      - name: Prove release package
        run: npm run verify:ci --silent
      - name: Upload proven npm tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-quality-${{ github.event.release.tag_name }}-npm-tarball
          path: .ts-quality/npm/ts-quality/tarballs/*.tgz
          if-no-files-found: error
      - name: Publish to npm with Trusted Publishing/OIDC
        id: publish_npm
        working-directory: .ts-quality/npm/ts-quality/package
        env:
          NPM_DIST_TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
        run: npm publish --provenance --access public --tag "$NPM_DIST_TAG"
      - name: Verify public npm package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          NPM_CONFIG_MIN_RELEASE_AGE: '0'
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "npm publish succeeded; waiting for public npm install resolution for ts-quality@${VERSION}."
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "Public install verification attempt ${attempt}/8"
            if npm view "ts-quality@${VERSION}" version && npx -y -p "ts-quality@${VERSION}" ts-quality --help; then
              echo "Public install verification succeeded on attempt ${attempt}/8"
              exit 0
            fi
            if [ "$attempt" -eq 8 ]; then
              exit 1
            fi
            echo "Public install verification attempt ${attempt}/8 failed; retrying after $((attempt * 15)) seconds."
            sleep $((attempt * 15))
          done
      - name: Attach proven tarball to GitHub Release
        if: ${{ !cancelled() && steps.publish_npm.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" .ts-quality/npm/ts-quality/tarballs/*.tgz --clobber
